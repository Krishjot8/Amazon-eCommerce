<div class="sign-in-page">
  <img class="amazon-authentication-logo" src="assets/logo-images/amazon-authentication-logo.jpg" routerLink=""
    alt="" />
  <div class="sign-in-container">
    <div class="span-signin">
      <span>Sign in or create account</span>
    </div>
    <div class="span-email-mobile">
      <span>Enter mobile number or email</span>
    </div>


    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-sign-in" novalidate>
      <div>
        <input class="inputlogin" autocomplete="off" type="email" required formControlName="emailOrPhone"
          [ngClass]="{'invalid': loginForm.get('emailOrPhone')?.hasError && submitted}" />

        <div class="error-message" *ngIf="errorMessage && submitted"><img class="error-icon"
            src="assets/logo-images/errors-icon.svg" alt="">{{errorMessage}}</div>


        <div class="continue-sign-in">
          <button (click)="onContinue()" type="submit">Continue</button>
        </div>
      </div>
    </form>



    <div class="sign-in-conditions-privacy">
      <p>By continuing, you agree to Amazon's <a href="">Conditions
          of Use</a> and <a href="">Privacy Notice</a>.</p>
    </div>
    <div class="sign-in-help">
      <span>Need Help?</span>
    </div>
    <hr>
    <div class="business-sign-in">
      <span>Buying for work?</span>
      <div class="business-sign-in-link">
        <a href="">Create a free business account</a>
      </div>
    </div>
  </div>


  <app-auth-footer></app-auth-footer>
</div>
